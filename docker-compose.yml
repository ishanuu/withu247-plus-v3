version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: withu247-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-withu247-plus}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - withu247-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend
  backend:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: withu247-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_INITDB_DATABASE:-withu247-plus}?authSource=admin
      MONGODB_DB_NAME: ${MONGO_INITDB_DATABASE:-withu247-plus}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_here_min_32_chars}
      AI_SERVICE_URL: http://ai-service:8000
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PUBMED_EMAIL: ${PUBMED_EMAIL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RISK_ALPHA: ${RISK_ALPHA:-0.4}
      RISK_BETA: ${RISK_BETA:-0.4}
      RISK_GAMMA: ${RISK_GAMMA:-0.2}
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_started
    volumes:
      - ./backend-node:/app
      - /app/node_modules
    networks:
      - withu247-network
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: withu247-ai-service
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      HOST: 0.0.0.0
      DEBUG: ${DEBUG:-False}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      SENTIMENT_MODEL: ${SENTIMENT_MODEL:-distilbert-base-uncased-finetuned-sst-2}
      DEEPFACE_MODEL: ${DEEPFACE_MODEL:-VGGFace}
      DEVICE: ${DEVICE:-cpu}
      RAG_TOP_K: ${RAG_TOP_K:-3}
      RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-500}
      RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-50}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
      CACHE_ENABLED: ${CACHE_ENABLED:-True}
      CACHE_TTL: ${CACHE_TTL:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./ai-service:/app
      - ai_service_cache:/app/cache
      - ai_service_models:/root/.cache
    networks:
      - withu247-network
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5

  # Frontend (Optional - for development)
  # Uncomment to run frontend in Docker
  # frontend:
  #   build:
  #     context: ./frontend-react
  #     dockerfile: Dockerfile
  #   container_name: withu247-frontend
  #   restart: always
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     REACT_APP_API_URL: http://localhost:5000
  #   depends_on:
  #     - backend
  #   networks:
  #     - withu247-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  ai_service_cache:
    driver: local
  ai_service_models:
    driver: local

networks:
  withu247-network:
    driver: bridge
